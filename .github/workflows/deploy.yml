name: Deploy WebApp

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & build
        run: |
          cd webapp
          npm install

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'pa4web-27100205'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./webapp
